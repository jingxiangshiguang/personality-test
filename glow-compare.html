<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>光晕效果对比</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { background: #1a1a2e; color: #fff; font-family: -apple-system, 'PingFang SC', sans-serif; padding: 30px 20px; }
h1 { text-align: center; font-size: 20px; margin-bottom: 30px; }
.row { display: flex; gap: 30px; justify-content: center; margin-bottom: 40px; flex-wrap: wrap; }
.card { background: #fff; border-radius: 20px; padding: 24px; color: #333; text-align: center; width: 300px; }
.card h3 { font-size: 15px; color: #666; margin-bottom: 16px; }
.card canvas { display: block; margin: 0 auto; }
.card .note { font-size: 12px; color: #888; line-height: 1.6; margin-top: 14px; border-top: 1px solid #eee; padding-top: 12px; }
.label-e { color: #E74C3C; font-weight: bold; }
.label-i { color: #6C5CE7; font-weight: bold; }
</style>
</head>
<body>

<h1>光晕效果对比</h1>

<div class="row">
  <div class="card">
    <h3><span class="label-e">E人</span> — 无光晕</h3>
    <canvas id="e_no" width="260" height="260"></canvas>
  </div>
  <div class="card">
    <h3><span class="label-e">E人</span> — 有光晕</h3>
    <canvas id="e_glow" width="260" height="260"></canvas>
    <div class="note">周围有一层淡淡的暖色雾气<br>像光环/气场，不闪眼</div>
  </div>
</div>

<div class="row">
  <div class="card">
    <h3><span class="label-i">I人</span> — 无光晕</h3>
    <canvas id="i_no" width="260" height="260"></canvas>
  </div>
  <div class="card">
    <h3><span class="label-i">I人</span> — 有光晕</h3>
    <canvas id="i_glow" width="260" height="260"></canvas>
    <div class="note">光晕向内收拢，冷色调<br>很微妙的"安静感"</div>
  </div>
</div>

<script>
const SEGMENTS = [
  { val: 55, color: '#E74C3C' },
  { val: 20, color: '#3498DB' },
  { val: 15, color: '#F39C12' },
  { val: 10, color: '#2ECC71' }
];
const LABELS = ['红色', '蓝色', '黄色', '绿色'];
const total = SEGMENTS.reduce((s, seg) => s + seg.val, 0);

function drawDonut(ctx, cx, cy, R, r) {
  let angle = -Math.PI / 2;
  SEGMENTS.forEach(seg => {
    const sweep = (seg.val / total) * Math.PI * 2;
    ctx.beginPath();
    ctx.arc(cx, cy, R, angle, angle + sweep);
    ctx.arc(cx, cy, r, angle + sweep, angle, true);
    ctx.closePath();
    ctx.fillStyle = seg.color;
    ctx.fill();
    angle += sweep;
  });
}

function drawLabels(ctx, cx, cy, R) {
  const labelR = R + 18;
  let angle = -Math.PI / 2;
  SEGMENTS.forEach((seg, i) => {
    const sweep = (seg.val / total) * Math.PI * 2;
    if (seg.val / total > 0.08) {
      const mid = angle + sweep / 2;
      const lx = cx + Math.cos(mid) * labelR;
      const ly = cy + Math.sin(mid) * labelR;
      ctx.font = 'bold 12px sans-serif';
      ctx.fillStyle = seg.color;
      ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
      ctx.fillText(LABELS[i], lx, ly - 7);
      ctx.font = '11px sans-serif';
      ctx.fillStyle = '#777';
      ctx.fillText(Math.round(seg.val / total * 100) + '%', lx, ly + 8);
    }
    angle += sweep;
  });
}

function drawArrows(ctx, cx, cy, r, isE, eiValue) {
  const arrowLen = 5 + Math.abs(eiValue - 50) / 50 * 10;
  const arrowEdge = r - 2;
  const arrowColor = isE ? 'rgba(231,76,60,0.4)' : 'rgba(108,92,231,0.4)';
  const arrowHeadSize = arrowLen * 0.45;
  [[0,-1],[0,1],[-1,0],[1,0]].forEach(([dx, dy]) => {
    ctx.save();
    ctx.strokeStyle = arrowColor; ctx.fillStyle = arrowColor;
    ctx.lineWidth = 1.5; ctx.lineCap = 'round';
    let sx, sy, ex, ey;
    if (isE) {
      sx = cx + dx * (arrowEdge - arrowLen); sy = cy + dy * (arrowEdge - arrowLen);
      ex = cx + dx * arrowEdge; ey = cy + dy * arrowEdge;
    } else {
      sx = cx + dx * arrowEdge; sy = cy + dy * arrowEdge;
      ex = cx + dx * (arrowEdge - arrowLen); ey = cy + dy * (arrowEdge - arrowLen);
    }
    ctx.beginPath(); ctx.moveTo(sx, sy); ctx.lineTo(ex, ey); ctx.stroke();
    const a = Math.atan2(ey - sy, ex - sx);
    ctx.beginPath(); ctx.moveTo(ex, ey);
    ctx.lineTo(ex - Math.cos(a - 0.45) * arrowHeadSize, ey - Math.sin(a - 0.45) * arrowHeadSize);
    ctx.lineTo(ex - Math.cos(a + 0.45) * arrowHeadSize, ey - Math.sin(a + 0.45) * arrowHeadSize);
    ctx.closePath(); ctx.fill();
    ctx.restore();
  });
}

function draw(canvasId, eiValue, withGlow) {
  const c = document.getElementById(canvasId);
  const ctx = c.getContext('2d');
  const cx = 130, cy = 130, R = 100;
  const isE = eiValue >= 50;
  const eiNorm = eiValue / 100;
  const r = 25 + eiNorm * 35;

  if (withGlow && isE) {
    const glow = ctx.createRadialGradient(cx, cy, R - 5, cx, cy, R + 20);
    glow.addColorStop(0, 'rgba(255,107,107,0.06)');
    glow.addColorStop(1, 'rgba(255,200,100,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, R + 20, 0, Math.PI * 2); ctx.fill();
  } else if (withGlow && !isE) {
    const glow = ctx.createRadialGradient(cx, cy, r * 0.2, cx, cy, R + 15);
    glow.addColorStop(0, 'rgba(162,155,254,0.07)');
    glow.addColorStop(1, 'rgba(108,92,231,0)');
    ctx.fillStyle = glow;
    ctx.beginPath(); ctx.arc(cx, cy, R + 15, 0, Math.PI * 2); ctx.fill();
  }

  drawDonut(ctx, cx, cy, R, r);
  drawLabels(ctx, cx, cy, R);
  drawArrows(ctx, cx, cy, r, isE, eiValue);

  ctx.font = 'bold 13px sans-serif';
  ctx.fillStyle = isE ? '#D63031' : '#6C5CE7';
  ctx.textAlign = 'center'; ctx.textBaseline = 'middle';
  ctx.fillText(isE ? 'E人' : 'I人', cx, cy - 8);
  ctx.font = 'bold 15px sans-serif';
  ctx.fillStyle = '#555';
  ctx.fillText(eiValue + '%', cx, cy + 12);
}

draw('e_no', 65, false);
draw('e_glow', 65, true);
draw('i_no', 35, false);
draw('i_glow', 35, true);
</script>
</body>
</html>
